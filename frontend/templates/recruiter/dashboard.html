<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareerForge Recruiter</title>
    <link rel="stylesheet" href="/static/dashboard.css" />
    <link rel="stylesheet" href="/static/recruiter.css" />
</head>

<body>

    <div class="db-layout recruiter-layout">
        <!-- SIDEBAR -->
        <aside class="db-sidebar" id="recSidebar">
            <div class="db-logo">
                <div class="db-logo-icon" style="background:var(--success);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="18" height="18">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
                <span class="db-logo-text">CF <span>Recruiter</span></span>
            </div>

            <nav class="db-nav">
                <span class="db-nav-section">Talent Pool</span>

                <a href="/recruiter/dashboard" class="{% if active_page == 'search' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    Search Candidates
                </a>

                <a href="/recruiter/pipeline" class="{% if active_page == 'pipeline' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <line x1="9" y1="3" x2="9" y2="21" />
                    </svg>
                    My Pipeline
                </a>

                <a href="#" class="coming-soon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    </svg>
                    Posted Jobs
                </a>

                <a href="#" class="coming-soon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17">
                        <line x1="18" y1="20" x2="18" y2="10" />
                        <line x1="12" y1="20" x2="12" y2="4" />
                        <line x1="6" y1="20" x2="6" y2="14" />
                    </svg>
                    Analytics
                </a>
            </nav>

            <div class="db-sidebar-footer">
                <nav class="db-nav">
                    <a href="/logout" class="db-logout">Logout</a>
                </nav>
            </div>
        </aside>

        <!-- BODY -->
        <div class="db-body" style="background:#f4f6fa;">
            <!-- Topbar -->
            <header class="db-topbar">
                <div class="db-topbar-title">DataDrive Tech (Recruiter)</div>
                <div class="db-topbar-actions">
                    <div class="db-topbar-avatar">R</div>
                </div>
            </header>

            <!-- Main Content -->
            <main class="rec-main">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <div class="db-toast-container" id="recToastContainer"></div>
    <script src="/static/recruiter_app.js"></script>
</body>

</html>
