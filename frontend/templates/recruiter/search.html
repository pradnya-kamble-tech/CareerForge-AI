{% extends 'recruiter/dashboard.html' %}

{% block content %}
<div class="rec-search-layout">

    <!-- Left: Filter Panel -->
    <aside class="rec-filter-panel db-card">
        <h3 style="margin-bottom:16px;font-size:16px;">Filters</h3>

        <div class="rec-filter-group">
            <label>Job Domain</label>
            <select id="domainFilter">
                <option value="">All Domains</option>
                <option value="Engineering">Engineering</option>
                <option value="Healthcare">Healthcare</option>
                <option value="Finance">Finance</option>
                <!-- Add other 9 domains if needed -->
            </select>
        </div>

        <div class="rec-filter-group">
            <label>Min ATS Score: <span id="scoreVal">50</span></label>
            <input type="range" id="scoreFilter" min="0" max="100" value="50">
        </div>

        <div class="rec-filter-group">
            <label>Experience Level</label>
            <select id="exprFilter">
                <option value="">Any Level</option>
                <option value="Entry">Entry</option>
                <option value="Mid">Mid</option>
                <option value="Senior">Senior</option>
                <option value="Lead">Lead</option>
            </select>
        </div>

        <div class="rec-filter-group">
            <label>Location</label>
            <input type="text" id="locFilter" placeholder="e.g. Remote" />
        </div>

        <button class="db-btn db-btn-primary" style="width:100%" id="applyFiltersBtn">Search Candidates</button>
        <div style="margin-top: 24px; border-top: 1px solid var(--border); padding-top: 16px;">
            <label style="font-weight:600;display:block;margin-bottom:8px">AI Rank by Job Description</label>
            <textarea id="jdInput" placeholder="Paste JD..."
                style="width:100%;height:80px;margin-bottom:10px;font-size:12px;padding:8px"></textarea>
            <button class="db-btn db-btn-outline" style="width:100%" id="rankJdBtn">Rank by JD</button>
        </div>
    </aside>

    <!-- Right: Results Panel -->
    <div class="rec-results-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2>Search Results</h2>
            <span id="resultsCount" style="color:var(--text-muted);font-size:14px;">0 Candidates</span>
        </div>

        <div id="resultsGrid" class="rec-results-grid">
            <!-- Candidates JS injected here -->
        </div>
    </div>

</div>

<!-- Modal -->
<div class="rec-modal" id="candidateModal">
    <div class="rec-modal-content db-card">
        <div style="display:flex;justify-content:space-between;">
            <h2 id="modalTitle">Candidate #000</h2>
            <button id="closeModal" style="background:none;border:none;cursor:pointer;font-size:20px">&times;</button>
        </div>
        <div style="margin-top:16px">
            <span class="db-badge green" id="modalScore">0 ATS</span>
            <span class="db-badge" id="modalDomain">Domain</span>
        </div>
        <div style="margin-top:20px">
            <h4>AI Summary</h4>
            <p id="modalSummary" style="color:var(--text-secondary);font-size:14px;line-height:1.5;">Generating
                summary...</p>
        </div>
        <div style="margin-top:20px">
            <h4>Top Skills</h4>
            <div id="modalSkills" class="db-keyword-pills" style="margin-top:8px"></div>
        </div>
        <div style="margin-top:24px; display:flex; gap:12px; justify-content:flex-end;">
            <button class="db-btn db-btn-outline" id="requestContactBtn">Request Contact</button>
            <button class="db-btn db-btn-primary" id="shortlistBtn">Shortlist Candidates</button>
        </div>
    </div>
</div>
{% endblock %}
